<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SQL Arena</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4ff;--surf:#fff;--bdr:#e2e8f8;
  --tx:#1e2a4a;--mu:#7b8fb5;
  --a:#6c63ff;--a2:#ff6b9d;--a3:#43d4a0;--a4:#ffb347;--a5:#5bc8f5;
  --sh:0 2px 12px rgba(108,99,255,.09);
  --r:18px;--fn:'Nunito',sans-serif;--mo:'JetBrains Mono',monospace
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--fn);color:var(--tx);background:var(--bg)}

/* ── SCREENS ── */
.scr{display:none;position:fixed;inset:0;flex-direction:column;overflow:hidden;z-index:2}
.scr.on{display:flex}

/* blobs */
.b{position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:0}
.b1{width:min(280px,60vw);height:min(280px,60vw);background:rgba(108,99,255,.11);top:-60px;right:-60px;animation:bd 10s ease-in-out infinite}
.b2{width:min(180px,44vw);height:min(180px,44vw);background:rgba(255,107,157,.09);bottom:50px;left:-40px;animation:bd 13s ease-in-out infinite reverse}
.b3{width:min(120px,30vw);height:min(120px,30vw);background:rgba(67,212,160,.09);top:45%;right:5px;animation:bd 16s ease-in-out infinite}
@keyframes bd{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(10px,-14px) scale(1.06)}}

/* ════════════════════════════════
   MODE SELECT
════════════════════════════════ */
#mSel{justify-content:center;align-items:center;padding:clamp(16px,4vh,32px) clamp(16px,5vw,28px);background:var(--bg)}
.mlogo{text-align:center;margin-bottom:clamp(16px,3.5vh,28px)}
.micon{
  width:clamp(58px,14vw,76px);height:clamp(58px,14vw,76px);
  border-radius:clamp(16px,4vw,22px);
  background:linear-gradient(135deg,var(--a),var(--a2));
  display:inline-flex;align-items:center;justify-content:center;
  font-size:clamp(26px,7vw,36px);margin-bottom:10px;
  box-shadow:0 8px 26px rgba(108,99,255,.28);
  animation:lf 4s ease-in-out infinite
}
@keyframes lf{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-7px) rotate(2deg)}}
.mh1{font-size:clamp(19px,5vw,26px);font-weight:900;letter-spacing:-.5px}
.mp{font-size:clamp(11px,2.8vw,13px);color:var(--mu);margin-top:4px;font-weight:600}
.mbtns{display:flex;flex-direction:column;gap:11px;width:100%;max-width:min(340px,92vw)}
.mbtn{
  display:flex;align-items:center;gap:13px;
  background:var(--surf);border:2px solid var(--bdr);
  border-radius:var(--r);padding:clamp(13px,3.2vw,19px) clamp(13px,3.8vw,20px);
  cursor:pointer;transition:transform .2s cubic-bezier(.34,1.56,.64,1);
  box-shadow:var(--sh);position:relative;overflow:hidden
}
.mbtn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--c1),var(--c2));opacity:0;transition:opacity .2s}
.mbtn:active{transform:scale(.96)}
.mbtn:active::before{opacity:.07}
.mbtn.idle{--c1:#6c63ff;--c2:#5bc8f5}
.mbtn.quiz{--c1:#ff6b9d;--c2:#ffb347}
.mbi{width:clamp(42px,10.5vw,54px);height:clamp(42px,10.5vw,54px);border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:clamp(21px,5.5vw,27px);background:linear-gradient(135deg,var(--c1),var(--c2));box-shadow:0 3px 10px rgba(0,0,0,.13);position:relative;z-index:1}
.mbt{text-align:left;position:relative;z-index:1}
.mbt strong{display:block;font-size:clamp(14px,3.5vw,16px);font-weight:800}
.mbt span{font-size:clamp(10px,2.5vw,12px);color:var(--mu);font-weight:600}
.mba{margin-left:auto;color:var(--mu);font-size:17px;position:relative;z-index:1}
.mtag{margin-top:18px;font-size:10px;color:var(--mu);font-weight:700;letter-spacing:1.5px;text-transform:uppercase}

/* ════════════════════════════════
   IDLE SCREEN
   topbar(fixed h) + ai-ribbon(auto) + body(flex:1, scroll)
════════════════════════════════ */
#idle{background:var(--bg)}

.itop{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 11px 7px;
  background:var(--surf);border-bottom:1px solid var(--bdr);
  flex-shrink:0;z-index:10;
  min-height:44px
}
.bk{background:var(--bg);border:1.5px solid var(--bdr);border-radius:9px;padding:4px 10px;font-family:var(--fn);font-size:11px;font-weight:700;color:var(--mu);cursor:pointer}
.bk:active{background:var(--bdr)}
.ititle{font-size:13px;font-weight:900}
.hintb{background:rgba(255,179,71,.12);border:1.5px solid rgba(255,179,71,.38);border-radius:20px;padding:4px 9px;font-size:10px;font-weight:800;color:var(--a4);cursor:pointer}
.hintb:active{background:rgba(255,179,71,.22)}

/* progress strip */
.pstrip{height:3px;background:var(--bdr);flex-shrink:0}
.pfill{height:100%;background:linear-gradient(90deg,var(--a),var(--a2));transition:width .6s ease;width:0%}

/* ── AI RIBBON ── */
.ai-ribbon{
  flex-shrink:0;overflow:hidden;
  max-height:90px;
  transition:max-height .38s ease, padding .38s ease;
  background:linear-gradient(135deg,rgba(108,99,255,.06),rgba(255,107,157,.05));
  border-bottom:1px solid var(--bdr);
  padding:8px 11px;
  display:flex;align-items:flex-start;gap:9px;
  position:relative;z-index:9
}
.ai-ribbon.hidden{max-height:0;padding-top:0;padding-bottom:0;border-bottom:none}
/* cloud icon */
.aico{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--a),var(--a2));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;position:relative;
  box-shadow:0 2px 10px rgba(108,99,255,.25);
  animation:aib 2.5s ease-in-out infinite
}
@keyframes aib{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
/* chat bubble tail */
.aico::after{content:'';position:absolute;bottom:-5px;left:7px;width:10px;height:10px;border-radius:50%;background:var(--surf);border:1.5px solid var(--bdr)}
.aico::before{content:'';position:absolute;bottom:-10px;left:3px;width:6px;height:6px;border-radius:50%;background:var(--surf);border:1.5px solid var(--bdr)}
.aimsg{flex:1;min-width:0}
.ainr{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.ainm{font-size:10px;font-weight:900;color:var(--a)}
.aidots{display:inline-flex;gap:3px}
.aidots span{width:4px;height:4px;border-radius:50%;background:var(--a);opacity:.4;animation:dd 1.2s ease-in-out infinite}
.aidots span:nth-child(2){animation-delay:.2s}
.aidots span:nth-child(3){animation-delay:.4s}
@keyframes dd{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-3px);opacity:1}}
.aitxt{font-size:11px;font-weight:600;color:var(--tx);line-height:1.55;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.aidx{background:none;border:none;font-size:16px;color:var(--mu);cursor:pointer;padding:0 2px;flex-shrink:0;align-self:flex-start}

/* ── 4-panel scroll body ── */
.ibody{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:8px 10px 20px;
  display:flex;flex-direction:column;gap:9px
}

/* shared card */
.ic{background:var(--surf);border:1.5px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;flex-shrink:0}
.ich{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 7px;border-bottom:1px solid var(--bdr)}
.icl{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase}
.ipill{font-size:9px;font-weight:700;color:#fff;border-radius:20px;padding:2px 8px}

/* C1 task */
.tq{font-size:clamp(12px,3vw,14px);font-weight:700;line-height:1.55;padding:10px 12px 5px}
.tctx{font-size:clamp(10px,2.5vw,11px);color:var(--mu);font-weight:600;line-height:1.5;background:var(--bg);border-radius:9px;padding:7px 9px;margin:0 12px 10px;font-family:var(--mo)}
.tbadge{display:flex;align-items:center;gap:5px}
.rolebadge{font-size:9px;font-weight:700;color:var(--mu);background:var(--bg);border:1px solid var(--bdr);padding:2px 7px;border-radius:20px}
.ddots{display:flex;gap:3px}
.ddot{width:7px;height:7px;border-radius:50%}

/* C2 visual — height auto-fills via JS, min-height for empty state */
.vstage{
  position:relative;overflow:hidden;
  height:clamp(100px, 22vw, 145px);
  display:flex;align-items:center;justify-content:center
}
.fcanv{position:absolute;inset:0;width:100%;height:100%}
.fnode{
  position:absolute;border-radius:11px;
  font-size:clamp(9px,2.2vw,11px);font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;
  box-shadow:0 2px 9px rgba(0,0,0,.10);padding:4px 6px;text-align:center;
  animation:ni .4s cubic-bezier(.34,1.56,.64,1) both
}
@keyframes ni{from{transform:scale(.7) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.fnode .nn{font-size:clamp(8px,2vw,10px);font-weight:700}
.fnode .nr{font-size:clamp(7px,1.8vw,9px);opacity:.7}
.farrow{position:absolute;font-size:clamp(12px,3vw,16px);color:var(--mu);animation:ap 1.3s ease-in-out infinite}
@keyframes ap{0%,100%{opacity:.4;transform:translateX(0)}50%{opacity:1;transform:translateX(3px)}}
.fresult{
  position:absolute;border-radius:11px;border:2px dashed var(--a3);
  background:rgba(67,212,160,.08);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;
  font-size:clamp(9px,2.2vw,11px);font-weight:800;color:var(--a3);padding:5px;text-align:center;
  animation:rp .55s cubic-bezier(.34,1.56,.64,1) both
}
@keyframes rp{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.vscan{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(108,99,255,.5),transparent);animation:sc 2.5s linear infinite;pointer-events:none}
@keyframes sc{from{top:0}to{top:100%}}
.vhint{font-size:10px;color:var(--mu);font-weight:600;text-align:center;padding:4px 12px 8px}

/* C3 table */
.tscroll{overflow-x:auto;padding:0 0 6px;max-width:100%}
.stbl{width:100%;border-collapse:collapse;font-family:var(--mo);font-size:clamp(9px,2.2vw,11px)}
.stbl th{background:var(--bg);color:var(--a);padding:6px 8px;text-align:left;font-size:clamp(8px,2vw,10px);font-weight:800;letter-spacing:.4px;border-bottom:1.5px solid var(--bdr);white-space:nowrap}
.stbl td{padding:5px 8px;color:var(--tx);border-bottom:1px solid var(--bdr);white-space:nowrap;font-weight:600}
.stbl tr:last-child td{border-bottom:none}
.pktag{font-size:7px;background:rgba(108,99,255,.12);color:var(--a);border-radius:4px;padding:1px 4px;font-weight:800;margin-left:2px}
.stbl tr.hl td{animation:rh 1.1s ease}
@keyframes rh{0%{background:rgba(67,212,160,.22)}100%{background:transparent}}

/* C4 editor */
.chips{display:flex;flex-wrap:wrap;gap:5px;padding:7px 11px 0}
.chip{background:var(--bg);border:1.5px solid var(--bdr);border-radius:7px;padding:3px 8px;font-family:var(--mo);font-size:clamp(9px,2.2vw,10px);font-weight:600;color:var(--a);cursor:pointer;transition:all .14s;white-space:nowrap}
.chip:active{background:rgba(108,99,255,.08);border-color:var(--a)}
.sqled{width:100%;background:var(--bg);border:none;border-top:1px solid var(--bdr);padding:9px 11px;color:var(--tx);font-family:var(--mo);font-size:clamp(11px,2.8vw,12px);line-height:1.8;resize:none;outline:none;min-height:68px;display:block}
.sqled::placeholder{color:var(--mu)}
.eacts{display:flex;gap:7px;padding:7px 11px 10px}
.rbtn{flex:1;background:linear-gradient(135deg,var(--a),var(--a5));border:none;border-radius:10px;padding:10px;font-family:var(--fn);font-size:clamp(12px,3vw,13px);font-weight:800;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;box-shadow:0 3px 11px rgba(108,99,255,.22);transition:transform .14s}
.rbtn:active{transform:scale(.97)}
.sbtn{flex:1;background:linear-gradient(135deg,var(--a3),#34c48e);border:none;border-radius:10px;padding:10px;font-family:var(--fn);font-size:clamp(12px,3vw,13px);font-weight:800;color:#fff;cursor:pointer;box-shadow:0 3px 11px rgba(67,212,160,.22);transition:transform .14s}
.sbtn:active{transform:scale(.97)}
.rbox{margin:0 11px 9px;background:var(--bg);border:1.5px solid var(--bdr);border-radius:10px;overflow:hidden;display:none;animation:su .3s ease}
.rbox.on{display:block}
@keyframes su{from{transform:translateY(5px);opacity:0}to{transform:translateY(0);opacity:1}}
.rhdr{display:flex;align-items:center;justify-content:space-between;padding:5px 9px;background:var(--surf);border-bottom:1px solid var(--bdr)}
.rok{font-size:9px;font-weight:800;color:var(--a3)}
.rerr{font-size:9px;font-weight:800;color:var(--a2)}
.rtbl{width:100%;border-collapse:collapse;font-family:var(--mo);font-size:clamp(9px,2.2vw,10px)}
.rtbl th{background:rgba(108,99,255,.06);color:var(--a);padding:4px 7px;text-align:left;font-size:9px;font-weight:800;white-space:nowrap}
.rtbl td{padding:4px 7px;color:var(--tx);border-top:1px solid var(--bdr);font-weight:600;white-space:nowrap}
.rtbl tr.nr td{animation:rh 1s ease}

/* ════════════════════════════════
   QUIZ SCREEN
════════════════════════════════ */
#quiz{background:var(--bg)}
.qtop{display:flex;align-items:center;justify-content:space-between;padding:9px 11px 7px;background:var(--surf);border-bottom:1px solid var(--bdr);flex-shrink:0}
.qbk{background:var(--bg);border:1.5px solid var(--bdr);border-radius:9px;padding:4px 10px;font-family:var(--fn);font-size:11px;font-weight:700;color:var(--mu);cursor:pointer}
.qctr{font-size:13px;font-weight:800;color:var(--mu)}
.qctr span{color:var(--a)}
.qsc{background:rgba(108,99,255,.10);border:1.5px solid rgba(108,99,255,.20);border-radius:20px;padding:3px 11px;font-size:12px;font-weight:800;color:var(--a)}
.qprog{height:4px;background:var(--bdr);flex-shrink:0}
.qpf{height:100%;background:linear-gradient(90deg,var(--a2),var(--a));transition:width .5s ease}
.qbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 11px 24px}
.qcat{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--a2);background:rgba(255,107,157,.10);border-radius:20px;padding:3px 9px;margin-bottom:8px}
.qcard{background:var(--surf);border:1.5px solid var(--bdr);border-radius:var(--r);padding:14px 13px 11px;box-shadow:var(--sh);margin-bottom:11px;position:relative;overflow:hidden;animation:ci .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes ci{from{transform:translateY(13px) scale(.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.qcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--a2),var(--a))}
.qnum{font-size:10px;font-weight:800;color:var(--mu);margin-bottom:5px;letter-spacing:1px}
.qtxt{font-size:clamp(14px,3.5vw,16px);font-weight:800;line-height:1.5}
.qopts{display:flex;flex-direction:column;gap:8px;margin-bottom:11px}
.qopt{background:var(--surf);border:1.5px solid var(--bdr);border-radius:12px;padding:11px 12px;cursor:pointer;transition:all .18s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:flex-start;gap:10px;box-shadow:var(--sh)}
.qopt:active:not([disabled]){transform:scale(.98)}
.optl{width:27px;height:27px;border-radius:8px;flex-shrink:0;background:var(--bg);border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--mu);transition:all .18s}
.optt{font-size:clamp(12px,3vw,13px);font-weight:700;line-height:1.5;flex:1;padding-top:3px}
.qopt.sel{border-color:var(--a);background:rgba(108,99,255,.04)}
.qopt.sel .optl{background:var(--a);border-color:var(--a);color:#fff}
.qopt.cor{border-color:var(--a3);background:rgba(67,212,160,.07)}
.qopt.cor .optl{background:var(--a3);border-color:var(--a3);color:#fff}
.qopt.wrg{border-color:var(--a2);background:rgba(255,107,157,.07)}
.qopt.wrg .optl{background:var(--a2);border-color:var(--a2);color:#fff}
.qfb{border-radius:12px;padding:12px 13px;margin-bottom:11px;display:none;animation:su .3s ease}
.qfb.on{display:block}
.qfb.cor{background:rgba(67,212,160,.10);border:1.5px solid rgba(67,212,160,.28)}
.qfb.wrg{background:rgba(255,107,157,.08);border:1.5px solid rgba(255,107,157,.22)}
.qfh{font-size:13px;font-weight:900;margin-bottom:5px}
.qfh.c{color:var(--a3)}.qfh.w{color:var(--a2)}
.qfbd{font-size:clamp(11px,2.8vw,12px);font-weight:600;line-height:1.65}
.qfe{margin-top:7px;font-size:11px;color:var(--mu);font-weight:600;font-family:var(--mo);background:var(--bg);border-radius:8px;padding:6px 8px}
.qnxt{width:100%;background:linear-gradient(135deg,var(--a),var(--a2));border:none;border-radius:12px;padding:13px;font-family:var(--fn);font-size:clamp(13px,3.5vw,14px);font-weight:800;color:#fff;cursor:pointer;display:none;box-shadow:0 4px 14px rgba(108,99,255,.22);transition:transform .14s}
.qnxt.on{display:block}
.qnxt:active{transform:scale(.97)}
/* results */
.rescrd{background:var(--surf);border:1.5px solid var(--bdr);border-radius:var(--r);padding:clamp(16px,4.5vh,24px) clamp(14px,4vw,20px);box-shadow:var(--sh);text-align:center;display:none;animation:ci .5s cubic-bezier(.34,1.56,.64,1)}
.rescrd.on{display:block}
.rstph{font-size:clamp(42px,11vw,52px);animation:tb .6s cubic-bezier(.34,1.56,.64,1) .2s both}
@keyframes tb{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}
.rsgrd{font-size:clamp(34px,9vw,42px);font-weight:900;color:var(--a);margin:4px 0}
.rstit{font-size:clamp(11px,2.8vw,13px);font-weight:800;color:var(--mu);letter-spacing:1px;margin-bottom:14px}
.rsst{display:flex;gap:7px;justify-content:center;margin-bottom:14px}
.rsitem{background:var(--bg);border:1.5px solid var(--bdr);border-radius:12px;padding:9px clamp(11px,3vw,16px);text-align:center}
.rsv{font-size:clamp(17px,4.5vw,21px);font-weight:900;color:var(--a)}
.rsl{font-size:9px;color:var(--mu);font-weight:700;margin-top:2px}
.rscmt{font-size:clamp(12px,3vw,13px);font-weight:600;line-height:1.6;margin-bottom:14px}
.btnag{width:100%;background:linear-gradient(135deg,var(--a2),var(--a));border:none;border-radius:12px;padding:12px;font-family:var(--fn);font-size:clamp(12px,3.5vw,14px);font-weight:800;color:#fff;cursor:pointer;margin-bottom:7px;box-shadow:0 3px 14px rgba(255,107,157,.22)}
.btnmn{width:100%;background:var(--bg);border:1.5px solid var(--bdr);border-radius:12px;padding:11px;font-family:var(--fn);font-size:clamp(12px,3vw,13px);font-weight:700;color:var(--mu);cursor:pointer}

/* toast */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--tx);color:#fff;border-radius:20px;padding:8px 17px;font-size:12px;font-weight:700;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 4px 18px rgba(0,0,0,.18);pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="b b1"></div><div class="b b2"></div><div class="b b3"></div>

<!-- ═══════════════ MODE SELECT ═══════════════ -->
<div id="mSel" class="scr on">

<script>
/* ─── TELEGRAM ─── */
const TG=window.Telegram?.WebApp;
let U={name:'friend',uname:''};
try{
  if(TG){TG.ready();TG.expand();}
  const u=TG?.initDataUnsafe?.user;
  if(u){U.name=u.first_name||'friend';U.uname=u.username?'@'+u.username:'';}
}catch(e){}

/* welcome */
const wEl=document.getElementById('wName');
const greeting=U.uname||U.name;
if(greeting!=='friend') wEl.textContent=`Hey ${greeting} 👋 Let's train your SQL!`;

/* ─── KEYS ─── */
const CFG=window.__SQL_ARENA_CONFIG__||{};
const GK=CFG.groqKey||'', GMK=CFG.geminiKey||'';

/* ─── TOAST ─── */
function toast(m,d=2600){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),d);}

/* ─── SCREEN ─── */
function show(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}
function goHome(){hideRib();show('mSel');}

/* ─── AI RIBBON ─── */
const AI_NAMES=['Groq · Llama3','Gemini · Flash','Mistral AI','Cerebras AI'];
let ribTimer=null;

function showRib(msg,thinking=false){
  const rib=document.getElementById('aiRib');
  const nm=document.getElementById('aiNm');
  const dts=document.getElementById('aiDts');
  const txt=document.getElementById('aiTxt');
  nm.textContent=IS.aiLabel+' → '+(U.uname||U.name);
  dts.style.display=thinking?'inline-flex':'none';
  txt.textContent=msg;
  rib.classList.remove('hidden');
  clearTimeout(ribTimer);
  if(!thinking) ribTimer=setTimeout(()=>hideRib(),8000);
}
function hideRib(){document.getElementById('aiRib').classList.add('hidden');clearTimeout(ribTimer);}
function setThinking(){showRib('Thinking about your next task...',true);}

/* ─── AI API ─── */
async function callAI(p){
  if(GK){try{
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+GK},body:JSON.stringify({model:'llama3-70b-8192',messages:[{role:'user',content:p}],temperature:.7,max_tokens:1200})});
    const d=await r.json();let t=d.choices?.[0]?.message?.content||'';
    t=t.replace(/```json|```/g,'').trim();
    const s=Math.max(t.indexOf('{'),t.indexOf('['));const e=Math.max(t.lastIndexOf('}')+1,t.lastIndexOf(']')+1);
    if(s>=0&&e>s)return JSON.parse(t.slice(s,e));
  }catch(e){console.warn('Groq',e);}}
  if(GMK){try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GMK}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:p}]}]})});
    const d=await r.json();let t=d.candidates?.[0]?.content?.parts?.[0]?.text||'';
    t=t.replace(/```json|```/g,'').trim();
    const s=Math.max(t.indexOf('{'),t.indexOf('['));const e=Math.max(t.lastIndexOf('}')+1,t.lastIndexOf(']')+1);
    if(s>=0&&e>s)return JSON.parse(t.slice(s,e));
  }catch(e){console.warn('Gemini',e);}}
  return null;
}

/* ─── USER PROFILE ─── */
let P={lv:1,xp:0,done:0,hist:[]};
try{const s=JSON.parse(localStorage.getItem('sqla5')||'{}');if(s.lv)P={...P,...s};}catch(e){}
function saveP(){try{localStorage.setItem('sqla5',JSON.stringify(P));}catch(e){}}

/* ─── SCHEMAS ─── */
const SC={
  employees:{label:'employees',
    cols:[{n:'emp_id',t:'INT',pk:1},{n:'first_name',t:'VARCHAR'},{n:'last_name',t:'VARCHAR'},{n:'department',t:'VARCHAR'},{n:'salary',t:'DECIMAL'},{n:'hire_date',t:'DATE'},{n:'manager_id',t:'INT'}],
    data:[{emp_id:1,first_name:'Alice',last_name:'Wong',department:'Engineering',salary:95000,hire_date:'2019-03-15',manager_id:null},{emp_id:2,first_name:'Bob',last_name:'Santos',department:'Marketing',salary:72000,hire_date:'2020-07-01',manager_id:1},{emp_id:3,first_name:'Clara',last_name:'Kim',department:'Engineering',salary:88000,hire_date:'2021-01-20',manager_id:1},{emp_id:4,first_name:'David',last_name:'Reyes',department:'HR',salary:65000,hire_date:'2018-11-05',manager_id:1},{emp_id:5,first_name:'Eva',last_name:'Tan',department:'Engineering',salary:102000,hire_date:'2017-06-30',manager_id:null},{emp_id:6,first_name:'Frank',last_name:'Lee',department:'Marketing',salary:68000,hire_date:'2022-03-10',manager_id:2}]},
  orders:{label:'orders',
    cols:[{n:'order_id',t:'INT',pk:1},{n:'customer_name',t:'VARCHAR'},{n:'product',t:'VARCHAR'},{n:'quantity',t:'INT'},{n:'unit_price',t:'DECIMAL'},{n:'order_date',t:'DATE'},{n:'status',t:'VARCHAR'}],
    data:[{order_id:101,customer_name:'Acme Corp',product:'Laptop',quantity:5,unit_price:1200,order_date:'2024-01-10',status:'Delivered'},{order_id:102,customer_name:'Beta LLC',product:'Monitor',quantity:10,unit_price:350,order_date:'2024-01-15',status:'Shipped'},{order_id:103,customer_name:'Acme Corp',product:'Keyboard',quantity:20,unit_price:80,order_date:'2024-02-01',status:'Delivered'},{order_id:104,customer_name:'Gamma Inc',product:'Laptop',quantity:2,unit_price:1200,order_date:'2024-02-10',status:'Pending'},{order_id:105,customer_name:'Beta LLC',product:'Mouse',quantity:15,unit_price:40,order_date:'2024-03-01',status:'Delivered'}]},
  sales:{label:'sales',
    cols:[{n:'sale_id',t:'INT',pk:1},{n:'rep_name',t:'VARCHAR'},{n:'region',t:'VARCHAR'},{n:'product',t:'VARCHAR'},{n:'amount',t:'DECIMAL'},{n:'sale_date',t:'DATE'},{n:'quarter',t:'INT'}],
    data:[{sale_id:1,rep_name:'Maria',region:'North',product:'CRM',amount:45000,sale_date:'2024-01-12',quarter:1},{sale_id:2,rep_name:'James',region:'South',product:'BI Dashboard',amount:32000,sale_date:'2024-01-20',quarter:1},{sale_id:3,rep_name:'Maria',region:'North',product:'BI Dashboard',amount:28000,sale_date:'2024-02-05',quarter:1},{sale_id:4,rep_name:'Anna',region:'East',product:'CRM',amount:51000,sale_date:'2024-04-18',quarter:2},{sale_id:5,rep_name:'James',region:'South',product:'CRM',amount:39000,sale_date:'2024-05-22',quarter:2}]}
};

const ST=[
  {role:'Data Analyst',dif:1,sc:'employees',q:'Find all employees in the Engineering department.',ctx:'Your manager needs a headcount list of engineers. Return all columns.',hint:"WHERE department = 'Engineering'",kw:['select','from','employees','where','engineering'],chips:['SELECT *','FROM employees','WHERE','department =']},
  {role:'Reporting Analyst',dif:1,sc:'employees',q:'List every unique department name — no duplicates.',ctx:'HR wants a clean list of all departments in the system.',hint:'DISTINCT removes duplicate values from a column.',kw:['distinct','department','employees'],chips:['SELECT DISTINCT','department','FROM employees']},
  {role:'Data Analyst',dif:1,sc:'orders',q:"Show all orders with status 'Delivered'.",ctx:'Operations needs all completed delivery records for review.',hint:"WHERE status = 'Delivered'",kw:['select','from','orders','where','delivered'],chips:['SELECT *','FROM orders','WHERE','status =']},
  {role:'BI Analyst',dif:2,sc:'employees',q:'Average salary per department, sorted highest to lowest.',ctx:'Finance needs a department salary summary for Q2 budget planning.',hint:'GROUP BY department, AVG(salary), ORDER BY … DESC',kw:['avg','salary','group by','department','order by'],chips:['SELECT department','AVG(salary)','GROUP BY','ORDER BY DESC']},
  {role:'SQL Developer',dif:2,sc:'orders',q:'Total revenue (quantity × unit_price) per customer.',ctx:'Sales wants a revenue breakdown report by customer.',hint:'SUM(quantity * unit_price), GROUP BY customer_name',kw:['sum','quantity','unit_price','group by','customer'],chips:['SUM(quantity * unit_price)','GROUP BY','customer_name']},
  {role:'BI Developer',dif:2,sc:'sales',q:'Total sales amount per region for Q1 only (quarter = 1).',ctx:'Quarterly regional performance report for the leadership dashboard.',hint:'WHERE quarter = 1, GROUP BY region, SUM(amount)',kw:['sum','amount','group by','region','where','quarter'],chips:['SUM(amount)','GROUP BY region','WHERE quarter = 1']},
  {role:'Data Engineer',dif:3,sc:'employees',q:'List employees who earn more than the average salary of their own department.',ctx:'HR wants to identify above-average earners per team for the bonus review.',hint:'Correlated subquery: WHERE salary > (SELECT AVG(salary) FROM employees e2 WHERE e2.department = e1.department)',kw:['avg','salary','where','department'],chips:['WHERE salary >','(SELECT AVG(salary)','WHERE department =']},
  {role:'Analytics Manager',dif:3,sc:'sales',q:'Rank each sales rep by total amount using a window function.',ctx:'Annual leaderboard: reps ordered by total revenue.',hint:'RANK() OVER (ORDER BY SUM(amount) DESC) with GROUP BY',kw:['rank','over','order by','sum','amount'],chips:['RANK() OVER','SUM(amount)','ORDER BY','GROUP BY rep_name']},
];

/* ─── IDLE STATE ─── */
let IS={task:null,schema:null,sName:'',result:null,aiLabel:AI_NAMES[0]};

/* ─── AI comments ─── */
function cGreet(){const n=U.uname||U.name;return [`Hey ${n}! I picked a task that fits your current level. Let's go 💪`,`${n}, here's a real-world SQL challenge. Read the context carefully!`,`I'm tracking your progress ${n} — this one will stretch you a bit 🎯`,`Nice to see you ${n}! Let's level up your SQL game today 🚀`][~~(Math.random()*4)];}
function cTask(t){return [`This is a typical ${t.role} job ticket — real companies ask exactly this.`,`As a ${t.role}, you'd see tasks like this in your first week. Nail it!`,`Tip: ${t.hint}`,`Check the schema below — it'll guide your query. You've got this! ✨`,`Think carefully about which SQL clauses you'll need for this ${t.role} task.`][~~(Math.random()*5)];}
function cRun(n){return [`You got ${n} row(s)! Does that match what the task expects? 🔍`,`${n} results returned. Review the output — does it look right?`,`Nice run! ${n} row(s). If it looks good, hit Submit ✓`,`Query executed — ${n} result(s). Check the table below 👇`][~~(Math.random()*4)];}
function cOk(){const n=U.uname||U.name;return [`Excellent, ${n}! That's the correct approach. XP gained ⭐`,`Perfect! A real ${IS.task?.role||'analyst'} would be proud of that query 🏆`,`Nailed it, ${n}! I'll give you something harder next time 😄`,`Correct! You're building real SQL instincts 💡`][~~(Math.random()*4)];}
function cPart(){return [`Almost! Check all required clauses. Hint: ${IS.task?.hint}`,`Good attempt! Refine your query — review the task context 🧐`,`You're close! A small tweak and it'll be perfect.`][~~(Math.random()*3)];}
function cErr(e){return `Hmm, syntax issue: "${e}". Check spelling and clause order 🛠️`;}

/* ─── OPEN IDLE ─── */
function openIdle(){
  IS.aiLabel=AI_NAMES[~~(Math.random()*AI_NAMES.length)];
  document.getElementById('aiNm').textContent=IS.aiLabel+' → '+(U.uname||U.name);
  show('idle');
  setThinking();
  loadTask();
}

async function loadTask(){
  document.getElementById('tQ').textContent='⏳ Preparing your task...';
  document.getElementById('tCtx').textContent='—';
  document.getElementById('rBox').classList.remove('on');
  document.getElementById('sqled').value='';
  document.getElementById('vHint').textContent='';
  IS.result=null;
  resetVis();

  let task=null;
  if(GK||GMK){
    const diff=P.lv<=2?'beginner':P.lv<=4?'intermediate':'advanced';
    const roles=['Data Analyst','BI Analyst','SQL Developer','Reporting Analyst','Data Engineer','BI Developer','Analytics Manager','Power BI Developer'];
    const role=roles[~~(Math.random()*roles.length)];
    const sks=Object.keys(SC);const sn=sks[~~(Math.random()*sks.length)];
    const cols=SC[sn].cols.map(c=>c.n).join(', ');
    const pr=`You are an SQL training AI. Generate ONE ${diff} SQL task for a ${role} role.
Table: "${sn}", columns: ${cols}.
Make it realistic — like a real job ticket or interview question a ${role} would face.
Return ONLY valid JSON (no markdown): {"role":"...","dif":${P.lv<=2?1:P.lv<=4?2:3},"sc":"${sn}","q":"...","ctx":"...","hint":"...","kw":["select","from"],"chips":["SELECT","FROM ${sn}"]}`;
    const res=await callAI(pr);
    if(res?.q)task={role:res.role||role,dif:res.dif||2,sc:sn,q:res.q,ctx:res.ctx||'',hint:res.hint||'',kw:res.kw||[],chips:res.chips||[]};
  }

  if(!task){
    const d=P.lv<=2?1:P.lv<=4?2:3;
    const pool=ST.filter(t=>t.dif<=d);
    const prev=P.hist.slice(-4).map(h=>h.q);
    const fresh=pool.filter(t=>!prev.includes(t.q));
    task=(fresh.length?fresh:pool)[~~(Math.random()*(fresh.length||pool.length))];
  }

  IS.task=task; IS.sName=task.sc; IS.schema=SC[task.sc]||SC.employees;
  renderTask(task); renderSchema(IS.schema); renderChips(task.chips||[]); updProg();
  setTimeout(()=>showRib(cTask(task)),350);
}

function renderTask(t){
  document.getElementById('tQ').textContent=t.q;
  document.getElementById('tCtx').textContent=t.ctx||'—';
  document.getElementById('roleL').textContent=t.role;
  document.getElementById('tblN').textContent=t.sc;
  const dc=document.getElementById('dDots'); dc.innerHTML='';
  const cs=['#43d4a0','#ffb347','#ff6b9d'];
  for(let i=0;i<3;i++){const d=document.createElement('div');d.className='ddot';d.style.background=i<t.dif?cs[t.dif-1]:'var(--bdr)';dc.appendChild(d);}
}

function renderSchema(sc){
  const tbl=document.getElementById('sTbl');
  let h='<thead><tr>';
  sc.cols.forEach(c=>h+=`<th>${c.n}${c.pk?'<span class="pktag">PK</span>':''}<br><span style="font-weight:600;opacity:.55;font-size:7px">${c.t}</span></th>`);
  h+='</tr></thead><tbody>';
  sc.data.slice(0,4).forEach(row=>{h+='<tr>';sc.cols.forEach(c=>h+=`<td>${row[c.n]??'—'}</td>`);h+='</tr>';});
  h+='</tbody>'; tbl.innerHTML=h;
}

function renderChips(arr){
  document.getElementById('chips').innerHTML=arr.map(c=>`<button class="chip" onclick="insChip(${JSON.stringify(c)})">${c}</button>`).join('');
}
function insChip(t){const ed=document.getElementById('sqled');const p=ed.selectionStart,v=ed.value;ed.value=v.slice(0,p)+t+' '+v.slice(p);ed.focus();ed.selectionStart=ed.selectionEnd=p+t.length+1;}

function updProg(){document.getElementById('ipf').style.width=Math.min(100,(P.done%10)*10)+'%';}

function showHint(){
  const t=IS.task; if(!t)return;
  const h=t.hint||t.kw?.join(', ')||'Think about which clauses you need!';
  document.getElementById('vHint').textContent='💡 '+h;
  showRib('💡 Hint: '+h);
}

/* ─── VISUAL ─── */
function resetVis(){
  document.getElementById('vMd').textContent='IDLE';
  document.getElementById('fCanv').innerHTML='<span style="font-size:11px;color:var(--mu);font-weight:700">Run a query to see the animation ✨</span>';
}

function animFlow(sql,result){
  const cv=document.getElementById('fCanv');
  const vm=document.getElementById('vMd');
  const vs=document.getElementById('vStage');
  const W=vs.offsetWidth||300;
  const H=vs.offsetHeight||120;

  const isJ=sql.includes('join'), isG=sql.includes('group by'), isW=sql.includes('where'), isA=/(avg|sum|count|max|min)/.test(sql);
  let mode='SELECT';
  if(isJ)mode='JOIN'; else if(isG&&isA)mode='AGGREGATE'; else if(isW)mode='FILTER';
  vm.textContent=mode;

  const total=IS.schema?.data?.length||0;
  const nc=result.rows.length;
  const pw=p=>Math.round(p*W/100)+'px'; // percent of stage width
  const ph=p=>Math.round(p*H/100)+'px'; // percent of stage height
  const nw=30; // node width %

  function nd(emoji,label,sub,l,t,w,bg,col,delay=0){
    return `<div class="fnode" style="left:${pw(l)};top:${ph(t)};width:${pw(w)};min-height:${ph(38)};background:${bg};border:2px solid ${col};color:${col};animation-delay:${delay}s">
      ${emoji}<span class="nn">${label}</span>${sub?`<span class="nr">${sub}</span>`:''}
    </div>`;
  }
  function ar(l,t,delay=0){return `<div class="farrow" style="left:${pw(l)};top:${ph(t)};animation-delay:${delay}s">→</div>`;}
  function rn(label,sub,l,t,w){
    return `<div class="fresult" style="left:${pw(l)};top:${ph(t)};width:${pw(w)};min-height:${ph(38)}">
      <span style="font-size:14px">✅</span><span>${label}</span>${sub?`<span style="font-size:8px;opacity:.7">${sub}</span>`:''}
    </div>`;
  }

  let html='';
  if(isJ){
    html+=nd('📋',IS.sName,total+'r',2,8,nw,'rgba(108,99,255,.09)','var(--a)');
    html+=ar(33,40);
    html+=nd('📋','Table B','matched',36,8,nw,'rgba(255,107,157,.09)','var(--a2)',0.15);
    html+=ar(67,40,0.3);
    html+=rn(nc+' rows','JOIN',70,8,28);
    html+=`<div class="fnode" style="left:${pw(36)};bottom:4px;width:${pw(28)};height:26px;background:rgba(67,212,160,.09);border:2px solid var(--a3);color:var(--a3);animation-delay:.35s;flex-direction:row;gap:4px;font-size:10px">⟶ JOIN</div>`;
  } else if(isG&&isA){
    html+=nd('📊',IS.sName,total+'r',2,8,nw,'rgba(108,99,255,.08)','var(--a)');
    html+=ar(33,42);
    html+=nd('🔀','GROUP BY','split',36,8,nw,'rgba(67,212,160,.09)','var(--a3)',0.18);
    html+=ar(67,42,0.3);
    html+=nd('∑','Aggregate',nc+' grp',70,8,28,'rgba(255,179,71,.09)','var(--a4)',0.36);
  } else if(isW){
    html+=nd('📋',IS.sName,total+'r',2,10,nw,'rgba(108,99,255,.08)','var(--a)');
    html+=ar(33,43);
    html+=nd('🔍','WHERE','filter',36,10,nw,'rgba(255,107,157,.09)','var(--a2)',0.2);
    html+=ar(67,43,0.32);
    html+=rn(nc+'/'+total,'matched',70,10,28);
  } else {
    html+=nd('📋',IS.sName,'all',5,12,38,'rgba(91,200,245,.09)','var(--a5)');
    html+=ar(44,43,0);
    html+=rn(nc+' rows','selected',50,12,44);
  }
  cv.innerHTML=html;

  // pulse table rows
  const trs=document.querySelectorAll('#sTbl tbody tr');
  trs.forEach((r,i)=>{if(i<nc){setTimeout(()=>{r.classList.add('hl');setTimeout(()=>r.classList.remove('hl'),1200);},i*90);}});
}

/* ─── RUN QUERY ─── */
function runQ(){
  const sql=document.getElementById('sqled').value.trim();
  if(!sql){toast('✏️ Write a query first');return;}
  document.getElementById('edSt').textContent='⏳ Running...';
  setTimeout(()=>{
    let res={cols:[],rows:[],error:null};
    try{res=simSQL(sql.toLowerCase(),IS.schema);}catch(e){res.error=e.message;}
    renderRes(res);

    document.getElementById('edSt').textContent=res.error?'❌ Error':`✅ ${res.rows.length} row(s)`;

}

/* ─── SIM SQL ─── */
function simSQL(sql,sc){
  let data=[...sc.data];
  const cols=sc.cols.map(c=>c.n);
  const wm=sql.match(/where\s+(.+?)(?:\s+group\s+by|\s+order\s+by|\s+having|\s+limit|$)/);
  if(wm)data=data.filter(r=>ew(wm[1].trim(),r));
  const gm=sql.match(/group\s+by\s+([\w,\s]+?)(?:\s+having|\s+order\s+by|\s+limit|$)/);
  if(gm){
    const gc=gm[1].split(',').map(s=>s.trim());
    const gr={};
    data.forEach(r=>{const k=gc.map(g=>r[g]).join('|');if(!gr[k])gr[k]=[];gr[k].push(r);});
    const sr=sql.match(/select\s+(.*?)\s+from/)?.[1]||'*';
    data=Object.values(gr).map(rows=>{
      const ar={};gc.forEach(g=>ar[g]=rows[0][g]);
      (sr.match(/(avg|sum|count|max|min)\((\w+|\*)\)(?:\s+as\s+(\w+))?/gi)||[]).forEach(fn=>{
        const m=fn.match(/(avg|sum|count|max|min)\((\w+|\*)\)(?:\s+as\s+(\w+))?/i);if(!m)return;
        const f=m[1].toLowerCase(),col=m[2],al=m[3]||`${f}(${col})`;
        const v=rows.map(r=>parseFloat(r[col])||0);
        ar[al]=f==='avg'?+(v.reduce((a,b)=>a+b,0)/v.length).toFixed(2):f==='sum'?+(v.reduce((a,b)=>a+b,0)).toFixed(2):f==='count'?rows.length:f==='max'?Math.max(...v):Math.min(...v);
      });
      return ar;
    });
  }
  const om=sql.match(/order\s+by\s+([\w().]+)(?:\s+(asc|desc))?/);
  if(om){const c=om[1],dir=om[2]||'asc';data.sort((a,b)=>dir==='asc'?(a[c]>b[c]?1:-1):(a[c]<b[c]?1:-1));}
  if(sql.includes('distinct')){const s=new Set();data=data.filter(r=>{const k=JSON.stringify(r);if(s.has(k))return false;s.add(k);return true;});}
  const lm=sql.match(/limit\s+(\d+)/);if(lm)data=data.slice(0,+lm[1]);
  const sm=sql.match(/select\s+(.*?)\s+from/);
  let fc=Object.keys(data[0]||{});
  if(sm){
    const raw=sm[1].trim();
    if(raw!=='*'){fc=raw.split(',').map(s=>{s=s.trim();const a=s.match(/(?:.*?)\s+as\s+(\w+)/i);if(a)return a[1];const f=s.match(/(avg|sum|count|max|min)\((\w+|\*)\)(?:\s+as\s+(\w+))?/i);if(f)return f[3]||`${f[1].toLowerCase()}(${f[2]})`;return s;});}
    else fc=Object.keys(data[0]||cols.reduce((o,c)=>({...o,[c]:''}),{}));
  }
  return {cols:fc,rows:data.map(r=>fc.map(c=>r[c]!==undefined?r[c]:'—'))};
}
function ew(cl,row){
  const es=cl.match(/(\w+)\s*=\s*'([^']*)'/i);if(es)return String(row[es[1]]||'').toLowerCase()===es[2].toLowerCase();
  const en=cl.match(/(\w+)\s*=\s*(\d+)/i);if(en)return Number(row[en[1]])===Number(en[2]);
  const gt=cl.match(/(\w+)\s*>\s*(\d+)/i);if(gt)return Number(row[gt[1]])>Number(gt[2]);
  const lt=cl.match(/(\w+)\s*<\s*(\d+)/i);if(lt)return Number(row[lt[1]])<Number(lt[2]);
  const lk=cl.match(/(\w+)\s+like\s+'([^']*)'/i);if(lk){const p=lk[2].replace(/%/g,'.*').replace(/_/g,'.');return new RegExp(p,'i').test(String(row[lk[1]]||''));}
  return true;
}

function renderRes(r){
  const b=document.getElementById('rBox');
  if(r.error){b.innerHTML=`<div class="rhdr"><span class="rerr">❌ ${r.error}</span></div>`;}
  else if(!r.rows.length){b.innerHTML=`<div class="rhdr"><span class="rok">✅ 0 rows</span></div>`;}
  else{
    let h=`<div class="rhdr"><span class="rok">✅ ${r.rows.length} row(s)</span></div><div style="overflow-x:auto"><table class="rtbl"><thead><tr>`;
    r.cols.forEach(c=>h+=`<th>${c}</th>`);h+='</tr></thead><tbody>';
    r.rows.forEach((row,i)=>{h+=`<tr class="nr" style="animation-delay:${i*.06}s">`;row.forEach(v=>h+=`<td>${v}</td>`);h+='</tr>';});
    h+='</tbody></table></div>';b.innerHTML=h;
  }
  b.classList.add('on');
}

/* ─── SUBMIT ─── */
function submitT(){
  const sql=document.getElementById('sqled').value.trim();
  if(!sql){toast('✏️ Write your SQL first');return;}
  const t=IS.task;if(!t)return;
  const kws=t.kw||[];
  const m=kws.filter(k=>sql.toLowerCase().includes(k.toLowerCase())).length;
  const sc=kws.length?Math.round((m/kws.length)*100):55;
  if(sc>=80){showRib(cOk());toast('🎉 Correct! +30 XP',3000);P.xp+=30;P.done++;if(P.xp>=P.lv*100)P.lv++;}
  else if(sc>=50){showRib(cPart());toast('✅ Good try! +15 XP',2800);P.xp+=15;P.done++;}
  else{showRib('💡 Hint: '+t.hint);toast('💡 Try again — check the hint!',3000);}
  P.hist.push({q:t.q,sc,ts:Date.now()});saveP();updProg();
  if(sc>=50)setTimeout(()=>{setThinking();loadTask();},3200);
}

let QZ={qs:[],i:0,score:0,cor:0};
function openQuiz(){
  show('quiz');
  QZ={qs:[...QS].sort(()=>Math.random()-.5).slice(0,10),i:0,score:0,cor:0};
  document.getElementById('qTot').textContent=QZ.qs.length;
  rQ();
}
function rQ(){
  if(QZ.i>=QZ.qs.length){rQRes();return;}
  const q=QZ.qs[QZ.i]; QZ._an=false;
  document.getElementById('qCur').textContent=QZ.i+1;
  document.getElementById('qSc').textContent=QZ.score+' pts';
  document.getElementById('qPf').style.width=(QZ.i/QZ.qs.length*100)+'%';
  const L=['A','B','C','D'];
  const b=document.getElementById('qBody'); b.scrollTop=0;
  b.innerHTML=`<div class="qcat">📌 ${q.cat}</div>
    <div class="qcard"><div class="qnum">Question ${QZ.i+1} of ${QZ.qs.length}</div><div class="qtxt">${q.q}</div></div>
    <div class="qopts">${q.o.map((o,i)=>`<button class="qopt" id="o${i}" onclick="pQ(${i})"><div class="optl">${L[i]}</div><div class="optt">${o}</div></button>`).join('')}</div>
    <div class="qfb" id="qfb"></div>
    <button class="qnxt" id="qn" onclick="nQ()">${QZ.i+1<QZ.qs.length?'Next Question →':'See Results 🏆'}</button>`;
}
function pQ(idx){
  if(QZ._an)return; QZ._an=true;
  const q=QZ.qs[QZ.i]; const ok=idx===q.c; const L=['A','B','C','D'];
  for(let i=0;i<q.o.length;i++){const el=document.getElementById('o'+i);if(!el)continue;el.setAttribute('disabled','');if(i===q.c)el.classList.add('cor');else if(i===idx&&!ok)el.classList.add('wrg');}
  if(ok){QZ.cor++;QZ.score+=100;document.getElementById('qSc').textContent=QZ.score+' pts';}
  const fb=document.getElementById('qfb');
  fb.className='qfb on '+(ok?'cor':'wrg');
  fb.innerHTML=`<div class="qfh ${ok?'c':'w'}">${ok?'✅ Correct!':'❌ Not quite'}</div>
    <div class="qfbd">${q.e}</div>${!ok?`<div class="qfe">✔ Correct: ${L[q.c]}. ${q.o[q.c]}</div>`:''}`;
  document.getElementById('qn').classList.add('on');
  try{TG?.HapticFeedback?.impactOccurred(ok?'light':'heavy');}catch(e){}
}
function nQ(){QZ.i++;rQ();}
function rQRes(){
  const acc=Math.round((QZ.cor/QZ.qs.length)*100);
  const g=acc>=90?'S':acc>=80?'A':acc>=70?'B':acc>=55?'C':'D';
  const tr={S:'🏆',A:'🥇',B:'🥈',C:'🥉',D:'😅'};
  const tt={S:'SQL GRANDMASTER',A:'QUERY EXPERT',B:'SOLID ENGINEER',C:'KEEP GOING',D:'NEEDS WORK'};
  const cm={S:'Outstanding! You\'re SQL interview-ready. 🎯',A:'Great job! Review edge cases for perfection.',B:'Solid! Revisit ACID, normalization & window functions.',C:'Getting there — review RDBMS basics and joins.',D:'Don\'t worry — start with SELECT basics and build up!'};
  document.getElementById('qPf').style.width='100%';
  document.getElementById('qBody').innerHTML=`<div class="rescrd on"><div class="rstph">${tr[g]}</div><div class="rsgrd">${g}</div><div class="rstit">${tt[g]}</div>
    <div class="rsst"><div class="rsitem"><div class="rsv">${QZ.score}</div><div class="rsl">Score</div></div><div class="rsitem"><div class="rsv">${QZ.cor}/${QZ.qs.length}</div><div class="rsl">Correct</div></div><div class="rsitem"><div class="rsv">${acc}%</div><div class="rsl">Accuracy</div></div></div>
    <div class="rscmt">${cm[g]}</div><button class="btnag" onclick="openQuiz()">🔄 Play Again</button><button class="btnmn" onclick="goHome()">← Back to Menu</button></div>`;
  try{if(TG?.sendData)TG.sendData(JSON.stringify({mode:'quiz',score:QZ.score,correct:QZ.cor,total:QZ.qs.length,accuracy:acc,grade:g}));}catch(e){}
  try{TG?.HapticFeedback?.notificationOccurred('success');}catch(e){}
}
